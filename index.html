/* ==========================================================================
   Atlantis University — Colors & Type
   Source of truth: ATLANTIS-TOOLKIT-2021.pdf (Graphic Guidelines)
   ========================================================================== */

/* --- Fonts -----------------------------------------------------------------
   Official typography (self-hosted variable fonts in /fonts):
     Oswald       — primary (titles + subtitles + body for print/brand)
     Open Sans    — secondary (exclusive substitute for web)
   -------------------------------------------------------------------------- */
@font-face {
  font-family: 'Oswald';
  src: url('fonts/Oswald-VariableFont_wght.ttf') format('truetype-variations'),
       url('fonts/Oswald-VariableFont_wght.ttf') format('truetype');
  font-weight: 200 700;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'Open Sans';
  src: url('fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype-variations'),
       url('fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 300 800;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'Open Sans';
  src: url('fonts/OpenSans-Italic-VariableFont_wdth_wght.ttf') format('truetype-variations'),
       url('fonts/OpenSans-Italic-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 300 800;
  font-style: italic;
  font-display: swap;
}

:root {
  /* ===== BRAND COLOR — Primary ===== */
  --au-red:           #ea1c24;   /* Atlantis Red — core brand */
  --au-red-dark:      #b8141a;   /* darker red used in the "A" mark fold */
  --au-black-pure:    #000000;
  --au-black:         #231f20;   /* near-black, official neutral */
  --au-white:         #ffffff;
  --au-gray-50:       #f5f5f5;   /* official surface neutral */

  /* ===== BRAND COLOR — School / Vertical accents (web only) ===== */
  --au-blue:          #00abe9;   /* Business */
  --au-green:         #30a049;   /* Health */
  --au-orange:        #ea7924;   /* Engineering */
  --au-yellow:        #fcb62b;   /* Education */
  --au-purple:        #702e84;   /* Language Institute */
  /* Computer Science shares the brand red */

  /* ===== Derived neutrals (bridge tokens, kept close to #231f20 / #f5f5f5) */
  --au-gray-100:      #ececec;
  --au-gray-200:      #d9d9d9;
  --au-gray-300:      #bfbfbf;
  --au-gray-400:      #8a8a8a;
  --au-gray-500:      #5a5659;
  --au-gray-600:      #3d3a3b;
  --au-gray-700:      #2a2728;
  --au-gray-800:      #231f20;

  /* ===== Semantic surfaces ===== */
  --bg-page:          var(--au-white);
  --bg-subtle:        var(--au-gray-50);
  --bg-inverse:       var(--au-black);
  --bg-brand:         var(--au-red);

  /* ===== Semantic foreground ===== */
  --fg-1:             var(--au-black);        /* primary text */
  --fg-2:             var(--au-gray-500);     /* secondary text */
  --fg-3:             var(--au-gray-400);     /* tertiary / meta */
  --fg-on-brand:      var(--au-white);
  --fg-on-inverse:    var(--au-white);
  --fg-brand:         var(--au-red);

  /* ===== Semantic borders ===== */
  --border-subtle:    var(--au-gray-100);
  --border-default:   var(--au-gray-200);
  --border-strong:    var(--au-black);

  /* ===== Status (derived from school palette) ===== */
  --status-success:   var(--au-green);
  --status-info:      var(--au-blue);
  --status-warning:   var(--au-yellow);
  --status-danger:    var(--au-red);

  /* ==========================================================================
     Typography
     ========================================================================== */
  --font-display:     'Oswald', 'Arial Narrow', 'Helvetica Neue Condensed', sans-serif;
  --font-body:        'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-mono:        ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* Type scale — display (Oswald, condensed, UPPERCASE by default) */
  --fs-display-xl:    clamp(3rem, 6vw, 5.5rem);    /* hero */
  --fs-display-lg:    clamp(2.25rem, 4.5vw, 4rem); /* section hero */
  --fs-display-md:    2.5rem;                     /* h1 */
  --fs-display-sm:    2rem;                       /* h2 */
  --fs-display-xs:    1.5rem;                     /* h3 */
  --fs-eyebrow:       0.75rem;                    /* eyebrow labels */

  /* Type scale — body (Open Sans) */
  --fs-body-lg:       1.125rem;
  --fs-body:          1rem;
  --fs-body-sm:       0.875rem;
  --fs-body-xs:       0.75rem;

  /* Line heights */
  --lh-tight:         1.05;
  --lh-snug:          1.2;
  --lh-normal:        1.5;
  --lh-loose:         1.7;

  /* Letter-spacing */
  --ls-tight:         -0.01em;
  --ls-normal:        0;
  --ls-wide:          0.04em;
  --ls-wider:         0.08em;   /* used on eyebrows / all-caps labels */

  /* Weights */
  --fw-regular:       400;
  --fw-medium:        500;
  --fw-semibold:      600;
  --fw-bold:          700;

  /* ==========================================================================
     Spacing / radii / shadows / motion
     ========================================================================== */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;
  --space-9:  96px;
  --space-10: 128px;

  --radius-none:   0;
  --radius-sm:     2px;
  --radius-md:     4px;   /* default — cards, buttons */
  --radius-lg:     8px;
  --radius-pill:   999px;

  /* Shadows — intentionally sparse. The toolkit leans flat / print-feel. */
  --shadow-sm:   0 1px 2px rgba(35,31,32,.06);
  --shadow-md:   0 6px 18px rgba(35,31,32,.10);
  --shadow-lg:   0 18px 40px rgba(35,31,32,.14);
  --shadow-red:  0 10px 28px rgba(234,28,36,.28);

  /* Motion — calm, editorial. No bounces. */
  --ease-standard: cubic-bezier(.2, .7, .2, 1);
  --ease-out:      cubic-bezier(.22, 1, .36, 1);
  --dur-fast:      120ms;
  --dur-med:       200ms;
  --dur-slow:      320ms;

  /* Layout */
  --max-content:   1200px;
  --max-prose:     68ch;
}

/* ==========================================================================
   Semantic element styles
   ========================================================================== */
html { color: var(--fg-1); background: var(--bg-page); }

body {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  color: var(--fg-1);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Display / headings — Oswald, uppercase, condensed rhythm */
.au-display,
h1, h2, h3, .au-h1, .au-h2, .au-h3 {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-normal);
  text-transform: uppercase;
  color: var(--fg-1);
  margin: 0;
  text-wrap: balance;
}

h1, .au-h1 { font-size: var(--fs-display-md); }
h2, .au-h2 { font-size: var(--fs-display-sm); }
h3, .au-h3 { font-size: var(--fs-display-xs); }

.au-hero-xl { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: var(--fs-display-xl); line-height: var(--lh-tight); }
.au-hero-lg { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: var(--fs-display-lg); line-height: var(--lh-tight); }

/* Eyebrows and tags — Open Sans, uppercase, wide tracking */
.au-eyebrow {
  font-family: var(--font-body);
  font-weight: var(--fw-bold);
  font-size: var(--fs-eyebrow);
  text-transform: uppercase;
  letter-spacing: var(--ls-wider);
  color: var(--fg-brand);
}

/* Body */
p, .au-p {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-loose);
  color: var(--fg-1);
  max-width: var(--max-prose);
  margin: 0 0 var(--space-4) 0;
  text-wrap: pretty;
}

.au-lede {
  font-family: var(--font-body);
  font-size: var(--fs-body-lg);
  line-height: var(--lh-normal);
  color: var(--fg-2);
  font-weight: var(--fw-regular);
}

.au-small { font-size: var(--fs-body-sm); color: var(--fg-2); }
.au-meta  { font-size: var(--fs-body-xs); color: var(--fg-3); letter-spacing: var(--ls-wide); text-transform: uppercase; }

a { color: var(--fg-brand); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

code, kbd, pre { font-family: var(--font-mono); font-size: 0.925em; }

/* Horizontal rule — red bar motif from the toolkit */
.au-rule {
  height: 4px;
  width: 56px;
  background: var(--au-red);
  border: 0;
  margin: var(--space-4) 0 var(--space-5);
}

/* Atlantis University — site-level styles
   Layered on top of colors_and_type.css */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: #fff; }

/* === Buttons ============================================================ */
.au-btn {
  font-family: 'Open Sans', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 14px 24px;
  border-radius: 4px;
  border: 0;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: background 160ms cubic-bezier(.2,.7,.2,1), color 160ms, transform 160ms, box-shadow 160ms;
  line-height: 1;
}
.au-btn-primary { background: #ea1c24; color: #fff; box-shadow: 0 8px 24px rgba(234,28,36,.28); }
.au-btn-primary:hover { background: #b8141a; text-decoration: none; }
.au-btn-primary:active { background: #981013; box-shadow: none; }

.au-btn-ghost-light { background: transparent; color: #fff; border: 2px solid #fff; padding: 12px 22px; }
.au-btn-ghost-light:hover { background: #fff; color: #231f20; text-decoration: none; }

.au-btn-ghost-dark { background: transparent; color: #231f20; border: 2px solid #231f20; padding: 12px 22px; }
.au-btn-ghost-dark:hover { background: #231f20; color: #fff; text-decoration: none; }

.au-btn-inverse { background: #fff; color: #ea1c24; }
.au-btn-inverse:hover { background: #f5f5f5; text-decoration: none; }

.au-btn-dark { background: #231f20; color: #fff; }
.au-btn-dark:hover { background: #3d3a3b; text-decoration: none; }

/* === Section primitives ================================================= */
.au-section { padding: 96px 0; }
.au-section-sm { padding: 64px 0; }
.au-container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

/* Section interstitial — full-bleed red block */
.au-red-section { background: #ea1c24; color: #fff; padding: 96px 0; }
.au-red-section .au-eyebrow { color: #fff; }
.au-red-section h1, .au-red-section h2, .au-red-section h3 { color: #fff; }

.au-dark-section { background: #231f20; color: #f5f5f5; padding: 96px 0; }
.au-dark-section .au-eyebrow { color: #ea1c24; }
.au-dark-section h1, .au-dark-section h2, .au-dark-section h3 { color: #fff; }

/* Eyebrow with leading bar */
.au-bar-eyebrow { display: inline-flex; align-items: center; gap: 12px; font-weight: 700; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: #ea1c24; }
.au-bar-eyebrow::before { content: ''; display: inline-block; width: 28px; height: 3px; background: #ea1c24; }

/* === Cards ============================================================== */
.au-card {
  background: #fff;
  border: 1px solid #ececec;
  border-radius: 4px;
  transition: transform 200ms cubic-bezier(.2,.7,.2,1), box-shadow 200ms, border-color 200ms;
}
.au-card:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(35,31,32,.10); }

/* === Form inputs ======================================================== */
.au-input, .au-select, .au-textarea {
  font-family: 'Open Sans', sans-serif;
  font-size: 15px;
  padding: 12px 14px;
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  background: #fff;
  color: #231f20;
  width: 100%;
  outline: none;
  transition: border-color 160ms, box-shadow 160ms;
}
.au-input:focus, .au-select:focus, .au-textarea:focus {
  border-color: #ea1c24;
  box-shadow: 0 0 0 3px rgba(234,28,36,.12);
}
.au-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #5a5659;
  display: block;
  margin-bottom: 6px;
}

/* === Animations ========================================================= */
@keyframes au-fade-up {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.au-anim { animation: au-fade-up 420ms cubic-bezier(.2,.7,.2,1) both; }

/* === Utility ============================================================ */
.au-rule-white { height: 4px; width: 56px; background: #fff; border: 0; margin: 16px 0 24px; }
.au-rule-thick { height: 4px; width: 80px; background: #ea1c24; border: 0; margin: 14px 0 22px; }

/* Scrollbar in interactive lists */
.au-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
.au-scroll::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 999px; }

/* Tag pill */
.au-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Open Sans', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 999px;
  background: #f5f5f5;
  color: #231f20;
}
.au-tag-red { background: #ea1c24; color: #fff; }
.au-tag-outline { background: transparent; border: 1px solid #d9d9d9; }

/* Big stat */
.au-stat-num {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 80px;
  line-height: .9;
  color: #ea1c24;
  letter-spacing: -0.01em;
}

/* News card image placeholder */
.au-img-bw { filter: grayscale(1) contrast(1.05); }

/* Hide scrollbar on horizontal rails */
.au-rail { display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 6px; }
.au-rail > * { flex: 0 0 auto; scroll-snap-align: start; }

/* Selection */
::selection { background: #ea1c24; color: #fff; }

/* === Header responsive ================================================== */
.au-hamburger { display: none; }
.au-mobile-drawer { display: none; }

@media (max-width: 1080px) {
  .au-nav-desktop { display: none !important; }
  .au-hamburger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border: 1px solid #ececec;
    background: #fff;
    border-radius: 999px;
    cursor: pointer;
    color: #231f20;
  }
  .au-apply-cta {
    padding: 10px 14px !important;
    font-size: 12px !important;
  }
  .au-utility-bar { display: none !important; }
}

@media (max-width: 720px) {
  .au-apply-cta { padding: 8px 12px !important; font-size: 11px !important; }
}

.au-mobile-drawer.open {
  display: block;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #ececec;
  border-bottom: 4px solid #ea1c24;
  box-shadow: 0 18px 40px rgba(35,31,32,.10);
  animation: au-fade-up 180ms cubic-bezier(.2,.7,.2,1) both;
  z-index: 60;
}
.au-mobile-drawer ul { list-style: none; margin: 0; padding: 12px 0; }
.au-mobile-drawer li a {
  display: block;
  padding: 14px 28px;
  font-family: 'Open Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: #231f20;
  text-decoration: none;
  border-bottom: 1px solid #f5f5f5;
}
.au-mobile-drawer li a:hover { background: #f5f5f5; color: #ea1c24; }
.au-mobile-drawer li.active a { color: #ea1c24; border-left: 4px solid #ea1c24; padding-left: 24px; }
  </style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
  </script>

        <div className="au-bar-eyebrow">{eyebrow}</div>

        <div className="au-rule-thick" />
        <p style={{ fontSize: 18, lineHeight: 1.55, color: '#5a5659', maxWidth: 640 }}>{blurb}</p>
      </div>
    </section>
  );
}

window.AdmissionsPage = AdmissionsPage;

window.InternationalPage = InternationalPage;
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroVariant": "photo",
      "showFinder": true,
      "schoolColorIntensity": "medium",
      "density": "comfortable"
    }/*EDITMODE-END*/;

    function App() {
      const [route, setRoute] = useState('home');
      const [search, setSearch] = useState('');
      const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

      const go = (r) => {
        setRoute(r);
        window.scrollTo({ top: 0, behavior: 'instant' });
      };

      let body = null;
      if (route === 'home') body = <HomePage go={go} tweaks={tweaks} />;
      else if (route === 'programs') body = <ProgramsPage go={go} />;
      else if (route.startsWith('program:')) body = <ProgramDetailPage id={route.split(':')[1]} go={go} />;
      else if (route === 'apply') body = <ApplyPage go={go} />;
      else if (route === 'admissions') body = <AdmissionsPage go={go} />;
      else if (route === 'tuition') body = <TuitionPage go={go} />;
      else if (route === 'why') body = <WhyPage go={go} />;
      else if (route === 'flex') body = <FlexPage go={go} />;
      else if (route === 'careers') body = <CareersPage go={go} />;
      else if (route === 'international') body = <InternationalPage go={go} />;
      else body = <div style={{ padding: '120px 32px', textAlign: 'center', fontFamily: "'Open Sans', sans-serif" }}>
        <div className="au-bar-eyebrow" style={{ justifyContent: 'center' }}>404</div>
        <h1 style={{ fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase', fontSize: 56, marginTop: 14 }}>Page under construction</h1>
        <a href="#" onClick={(e) => { e.preventDefault(); go('home'); }} className="au-btn au-btn-primary" style={{ marginTop: 24 }}>Back to home →</a>
      </div>;

      const densityScale = tweaks.density === 'compact' ? 0.88 : 1;

      return (
        <div style={{ fontSize: `${densityScale}rem` }}>
          <Header route={route} go={go} search={search} setSearch={setSearch} />
          {body}
          <Footer go={go} />
          <TweaksPanel title="Tweaks">
            <TweakSection title="Home hero">
              <TweakRadio
                label="Variant"
                value={tweaks.heroVariant}
                onChange={(v) => setTweaks('heroVariant', v)}
                options={[
                  { value: 'photo', label: 'Photo' },
                  { value: 'red', label: 'Red' },
                  { value: 'split', label: 'Split' },
                ]}
              />
              <TweakToggle
                label="Course finder"
                value={tweaks.showFinder}
                onChange={(v) => setTweaks('showFinder', v)}
              />
            </TweakSection>
            <TweakSection title="Layout">
              <TweakRadio
                label="Density"
                value={tweaks.density}
                onChange={(v) => setTweaks('density', v)}
                options={[
                  { value: 'comfortable', label: 'Comfortable' },
                  { value: 'compact', label: 'Compact' },
                ]}
              />
            </TweakSection>
            <TweakSection title="Quick jump">
              <div style={{ display: 'grid', gap: 6 }}>
                {[['home','Home'],['programs','Programs'],['program:mba','MBA'],['program:ai','MS in AI'],['program:education','M.Ed.'],['apply','Apply'],['admissions','Admissions'],['tuition','Tuition'],['why','Why Atlantis'],['flex','Study Options'],['careers','Careers'],['international','International']].map(([r,l]) => (
                  <button key={r} onClick={() => go(r)} style={{
                    textAlign: 'left', padding: '8px 10px', fontFamily: "'Open Sans', sans-serif", fontSize: 12,
                    border: '1px solid #ececec', background: route === r ? '#231f20' : '#fff', color: route === r ? '#fff' : '#231f20',
                    borderRadius: 4, cursor: 'pointer', fontWeight: 600,
                  }}>{l}</button>
                ))}
              </div>
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
